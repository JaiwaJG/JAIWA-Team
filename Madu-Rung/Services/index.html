<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Outline VPN | JAIWA Team</title>

</head>

<body>

<header>

<a href="../">

← Dashboard

</a>

<h1>Manage Outline VPN</h1>

<p>

Manage VPN servers and access keys.

</p>

</header>

<main>

<section>

<h2>Add VPN Server</h2>

<form id="serviceForm">

<input
type="text"
id="serverName"
placeholder="Server Name"
required>

<select id="country">

<option value="SG">🇸🇬 Singapore</option>

<option value="JP">🇯🇵 Japan</option>

<option value="US">🇺🇸 USA</option>

<option value="KR">🇰🇷 Korea</option>

</select>

<select id="status">
<option value="online">Online</option>
<option value="maintenance">Maintenance</option>
<option value="offline">Offline</option>
</select>

<input
type="text"
id="traffic"
placeholder="Unlimited / 100 GB"
required>

<input
type="date"
id="expire"
required>

<textarea
id="accessKey"
placeholder="Outline Access Key"
required></textarea>

<button type="submit">

Save Server

</button>

</form>

</section>

<hr>

<section>

<h2>VPN Servers</h2>

<div id="servicesList">

</div>

</section>

</main>

<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/guard.js"></script>

<script src="../../assets/js/Madu-Rung/services.js"></script>

</body>
</html>
