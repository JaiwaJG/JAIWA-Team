<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Books | JAIWA Team</title>

</head>

<body>

<header>

<a href="../">

← Dashboard

</a>

<h1>Manage Books</h1>

<p>

Add, edit and delete books.

</p>

</header>


<main>

<section>

<h2>Add New Book</h2>

<form id="bookForm">

<input
type="text"
id="title"
placeholder="Book Title"
required>

<input
type="text"
id="description"
placeholder="Short Description"
required>

<input
type="text"
id="author"
placeholder="Author"
required>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="text"
id="language"
placeholder="Language"
required>

<input
type="url"
id="coverImage"
placeholder="Cover Image URL"
required>

<input
type="url"
id="pdfFile"
placeholder="PDF URL"
required>

<input
type="number"
id="pages"
placeholder="Pages"
required>

<button type="submit">

Save Book

</button>

</form>

</section>



<hr>



<section>

<h2>Books List</h2>

<div id="booksList">

</div>

</section>

</main>


<script src="../../../assets/js/config.js"></script>
<script src="../../../assets/js/storage.js"></script>
<script src="../../../assets/js/api.js"></script>
<script src="../../../assets/js/guard.js"></script>
<script src="../../../assets/js/Madu-Rung/Resources/books.js"></script>

</body>

</html>
