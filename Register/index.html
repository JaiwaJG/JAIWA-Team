<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | JAIWA Team</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Shared CSS -->

    <link rel="stylesheet"
          href="../assets/css/auth.css">

    <!-- Register CSS -->

    <link rel="stylesheet"
          href="../assets/css/register.css">

</head>

<body>

    <div class="particles"></div>

    <main class="auth-container">

        <!-- Logo -->

        <!-- Header -->

        <header class="auth-header">

            <h1>Create Account</h1>

            <p>Join JAIWA Team today.</p>

        </header>

        <!-- Register Form -->

        <form class="auth-form"
              id="registerForm">

            <!-- Full Name -->

            <div class="input-group">

                <label for="fullname">

                    Full Name

                </label>

                <div class="input-wrapper">

                    <svg class="input-icon"
                         xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M5.121 17.804A9 9 0 1118.879 17.804"/>

                        <circle cx="12"
                                cy="7"
                                r="4"/>

                    </svg>

                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        placeholder="Enter your full name"
                        required>

                </div>

            </div>

            <!-- Username -->

            <div class="input-group">

                <label for="username">

                    Username

                </label>

                <div class="input-wrapper">

                    <svg class="input-icon"
                         xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M16 14a4 4 0 10-8 0"/>

                        <circle cx="12"
                                cy="8"
                                r="4"/>

                    </svg>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Choose a username"
                        required>

                </div>

            </div>
            <!-- Email -->

            <div class="input-group">

                <label for="email">

                    Email Address

                </label>

                <div class="input-wrapper">

                    <svg class="input-icon"
                         xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M3 8l9 6 9-6"/>

                        <rect x="3"
                              y="5"
                              width="18"
                              height="14"
                              rx="2"/>

                    </svg>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required>

                </div>

            </div>


            <!-- Password -->

            <div class="input-group">

                <label for="password">

                    Password

                </label>

                <div class="input-wrapper">

                    <svg class="input-icon"
                         xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <rect x="5"
                              y="11"
                              width="14"
                              height="10"
                              rx="2"/>

                        <path d="M8 11V8a4 4 0 118 0v3"/>

                    </svg>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a password"
                        required>

                    <button
                        type="button"
                        class="password-toggle">

                        <i class="fa-regular fa-eye"></i>

                    </button>

                </div>

            </div>


            <!-- Password Strength -->

            <div class="password-strength">

                <div class="password-strength-bar">

                    <div class="password-strength-fill"></div>

                </div>

                <!--<div class="password-strength-text">
                    Password Strength
                </div>-->

            </div>


            <!-- Confirm Password -->

            <div class="input-group">

                <label for="confirmPassword">

                    Confirm Password

                </label>

                <div class="input-wrapper">

                    <svg class="input-icon"
                         xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <rect x="5"
                              y="11"
                              width="14"
                              height="10"
                              rx="2"/>

                        <path d="M8 11V8a4 4 0 118 0v3"/>

                    </svg>

                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Confirm your password"
                        required>

                    <button
                        type="button"
                        class="password-toggle">

                        <i class="fa-regular fa-eye"></i>

                    </button>

                </div>

            </div>
            <!-- Terms -->

            <label class="terms">

                <input
                    type="checkbox"
                    id="terms"
                    required>

                <span>
                    I agree to the
                    <a href="../T&C/">
                        Terms & Conditions
                    </a>
                </span>

            </label>


            <!-- Register Button -->

            <button
                type="submit"
                class="btn-submit">
                Create Account
            </button>

        </form>


        <!-- Divider -->

        <div class="divider">

            <span>OR</span>

        </div>


        <!-- Social Login --

        <div class="social-login">

        -- Google --

        <button
            class="btn-social"
            type="button">

            <i class="fa-brands fa-google"></i>

            Google

        </button>

        -- Apple --

        <button
            class="btn-social"
            type="button">

            <i class="fa-brands fa-apple"></i>

            Apple

        </button>
        </div>-->


        <!-- Footer -->

        <div class="auth-footer">
            
            Already have an account?
            <a href="../Login/">
                Sign In
            </a>

        </div>

    </main>


    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


    <!-- Shared JS -->

    <script src="../assets/js/auth.js"></script>


    <!-- Register JS -->

    <script src="../assets/js/register.js"></script>

</body>

</html>
