<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JAIWA Mini Games</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <header>

        <a href="/" class="back-btn">
            ← Back
        </a>

        <h1>
            🎮 Mini Games
        </h1>

        <p>
            Play simple browser games built by JAIWA.
        </p>

    </header>
    <main class="games-grid">
        <a href="Tic-Tac-Toe/" class="game-card">

            <div class="game-icon">
                ❌⭕
            </div>

            <h2>
                Tic Tac Toe
            </h2>

            <p>
                Classic two-player strategy game.
            </p>

            <span>
                Play →
            </span>

        </a>
        <div class="game-card coming">

            <div class="game-icon">
                🐍
            </div>

            <h2>
                Snake
            </h2>

            <p>
                Coming Soon
            </p>

        </div>
        <div class="game-card coming">

            <div class="game-icon">
                🧠
            </div>

            <h2>
                Memory Game
            </h2>

            <p>
                Coming Soon
            </p>

        </div>
        <div class="game-card coming">

            <div class="game-icon">
                🟦
            </div>

            <h2>
                2048
            </h2>

            <p>
                Coming Soon
            </p>

        </div>
        <div class="game-card coming">

            <div class="game-icon">
                🐦
            </div>

            <h2>
                Flappy Bird
            </h2>

            <p>
                Coming Soon
            </p>

        </div>
        <div class="game-card coming">

            <div class="game-icon">
                🚀
            </div>

            <h2>
                Space Shooter
            </h2>

            <p>
                Coming Soon
            </p>

        </div>

    </main>
    <script src="script.js"></script>

</body>

</html>
