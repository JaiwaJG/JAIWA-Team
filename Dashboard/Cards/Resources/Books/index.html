<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Free Books | JAIWA Team</title>
</head>

<body>
    <header>

        <a href="../">
            ← Dashboard
        </a>

        <h1>Free Books</h1>

        <p>
            Browse free English and Myanmar books.
        </p>

    </header>

    <main>

        <section>

            <input
                type="search"
                id="bookSearch"
                placeholder="Search books..."
            >

        </section>

        <section>

            <button type="button" data-category="All">All</button>
            <button type="button" data-category="English">English</button>
            <button type="button" data-category="Myanmar">Myanmar</button>
            <button type="button" data-category="Programming">Programming</button>
            <button type="button" data-category="Business">Business</button>
            <button type="button" data-category="AI">AI</button>

        </section>


        <!-- Books -->

        <section
            id="booksList"
            class="books-list">

        </section>

    </main>

    <script src="../../../../assets/js/config.js"></script>
    <script src="../../../../assets/js/storage.js"></script>
    <script src="../../../../assets/js/api.js"></script>
    <script src="../../../../assets/js/guard.js"></script>
    <script src="../../../../assets/js/Dashboard/Cards/Resources/books.js"></script>

</body>

</html>
