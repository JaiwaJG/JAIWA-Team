<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Feedback | JAIWA Team</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="nav-ctn">
    <div class="logo">
      <span>JAIWA Team</span>
    </div>
    <button class="menu-btn">
      <span></span>
      <span></span>
      <span></span>
    </button> 
    <div class="nav-right">
      <a href="/">HOME</a>
      <a href="/#journey">MY JOURNEY</a>
      <a href="/#resources-head">RESOURCES</a>
    </div>
  </nav>

  <section class="feedback-section reveal">
    <div class="feedback-card">
      <h2>Share Your Feedback</h2>
      <p>
        Have an idea, suggestion, or advice for my website?
      </p>
      <p>
        Feel free to share it with me.
      </p>

      <form id="feedbackForm" action="https://formspree.io/f/xvznvzzk" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="_replyto" placeholder="Your Email / Gmail" required>
        <textarea name="message" placeholder="Write your feedback or suggestion..." required></textarea>

        <button class="sumit-btn" type="submit">Submit Feedback</button>
      </form>
      <div id="successOverlay" class="success-overlay">
        <div class="success-box">
          <div class="checkmark">✓</div>
            <h2>Feedback Sent!</h2>
            <p>Thanks for sharing your suggestion.</p>
          </div>
        </div>
      </div>
  </section>
<footer>
  <p>
    © 2026 JAIWA Team | Built by Jaiwa Gum Seng Lat |
    <a href="/T&C/">Terms & Conditions</a>
  </p>
</footer>
<script src="../script.js"></script>
</body>
</html>
