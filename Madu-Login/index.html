<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Madu Login | JAIWA Team</title>

    <link rel="stylesheet" href="../assets/css/variables.css">

    <link rel="stylesheet" href="../assets/css/reset.css">

    <link rel="stylesheet" href="../assets/css/main.css">

    <link rel="stylesheet" href="../assets/css/login.css">

    <link rel="stylesheet" href="../assets/css/madu-login.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <main class="madu-login-page">

        <section class="madu-login-card">

            <h1 class="section-title">
                Madu Login
            </h1>

            <p class="section-subtitle">
                Authorized Madu accounts only.
            </p>

            <form id="maduLoginForm">

                <div>

                    <label for="email">
                        Email
                    </label>

                    <input
                        id="email"
                        type="email"
                        placeholder="Enter email"
                        required>

                </div>

                <div>

                    <label for="password">
                        Password
                    </label>

                    <input
                        id="password"
                        type="password"
                        placeholder="Enter password"
                        required>

                </div>

                <button
                    id="loginBtn"
                    type="submit"
                    class="btn btn-primary w-100">
                    Login
                </button>

            </form>

            <p id="loginMessage"></p>

        </section>

    </main>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/madu-login.js"></script>
</body>

</html>
